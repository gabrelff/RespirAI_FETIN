<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RespirAI - Registro de Pacientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <div class="logo">RespirAI</div>
        <a href="index.html" class="menu-link"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-panel-left-open-icon lucide-panel-left-open"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m14 9 3 3-3 3"/></svg> Painel Clínico</a>
        <a href="registro_pacientes.html" class="menu-link"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-menu-icon lucide-square-menu"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 8h10"/><path d="M7 12h10"/><path d="M7 16h10"/></svg> Registro de Pacientes</a>
    </div>
    
    <div class="main-content">
        <div class="header-container">
            <div class="header">
                <h1>Registro de Pacientes</h1>
                <p>Cadastro e gerenciamento de pacientes</p>
            </div>
            <button class="btn-primary" id="btn-abrir-aba">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                Cadastrar Paciente
            </button>
        </div>

        <div class="table-container">
            <div class="search-bar">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-round-search-icon lucide-user-round-search"><circle cx="10" cy="8" r="5"/><path d="M2 21a8 8 0 0 1 10.434-7.62"/><circle cx="18" cy="18" r="3"/><path d="m22 22-1.9-1.9"/></svg>
                <input type="text" placeholder="Buscar por nome...">
            </div>

            <table class="patients-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>PACIENTE</th>
                        <th>DATA DO CADASTRO</th>
                        <th>NÍVEL DE RISCO</th>
                        <th>SCORE</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="patients-table-js">

                </tbody>
            </table>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="side-panel" id="painel-cadastro">
        <div class="panel-header">
            <div>
                <h2>Cadastrar Novo Paciente</h2>
                <p>Preencha os dados e o histórico clínico.</p>
            </div>
            <button class="btn-close" id="btn-fechar-aba">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <form class="panel-form">
            <div class="form-row">
                <div class="form-group">
                    <label>NOME</label>
                    <input type="text" placeholder="Maria">
                </div>
                <div class="form-group">
                    <label>SOBRENOME</label>
                    <input type="text" placeholder="Silva">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>DATA DE NASCIMENTO</label>
                    <input type="date">
                </div>
                <div class="form-group">
                    <label>SEXO</label>
                    <select>
                        <option>Feminino</option>
                        <option>Masculino</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>OCUPAÇÃO / EXPOSIÇÕES</label>
                <input type="text" placeholder="Ex: Mineiro, Trabalhador de escritório">
            </div>

            <button type="button" class="btn-primary full-width" style="margin-top: 30px;">Cadastrar Paciente</button>
        </form>
    </div>

    <script src="script.js"></script>

</body>
</html>
